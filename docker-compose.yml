# edgebridge-aeb -- default deployment (HOST networking).
#
# Host networking is the DEFAULT so that real LAN client IPs are seen and
# mDNS auto-discovery, device->hub forwarding, and MQTT forward all work.
# There is NO port mapping in host mode: the bridge listens directly on the
# host's Server_Port (default 8088). Reach it at  http://<host-ip>:8088 .
# If 8088 is taken on the host, change it with EB_SERVER_PORT below.
#
# Need isolated port-mapping instead (bridge network)? Use docker-compose.bridge.yml.

services:
  edgebridge:
    #image: woobooung/edgebridge-aeb:latest
    build: .
    container_name: edgebridge-aeb
    network_mode: host
    #ports:
    #  - "8088:8088"
    # environment:
    #   - EB_ST_TOKEN=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx   # optional SmartThings PAT
    #   - EB_SERVER_PORT=8088                                # change if 8088 is taken
    volumes:
      - ./data:/data
      # - ./edgebridge.cfg:/usr/src/app/edgebridge.cfg       # optional config file
    restart: unless-stopped
