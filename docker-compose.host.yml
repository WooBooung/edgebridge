# edgebridge-aeb -- HOST networking variant.
#
# Use this (instead of docker-compose.yml) when you want:
#   - mDNS auto-discovery (_edgebridge._tcp) to work, and/or
#   - device->hub forwarding / MQTT forward auto-IP to see REAL LAN client IPs.
#
# In host mode there is NO port mapping: the bridge listens directly on the host's
# Server_Port (default 8088). Reach it at http://<host-ip>:8088 .
# Change the port via edgebridge.cfg (Server_Port) if 8088 conflicts on the host.

services:
  edgebridge:
    image: woobooung/edgebridge-aeb:latest
    container_name: edgebridge-aeb
    network_mode: host
    volumes:
      - ./data:/data
      # Optionally externalize the config file:
      # - ./edgebridge.cfg:/usr/src/app/edgebridge.cfg
    restart: unless-stopped
