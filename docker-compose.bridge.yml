# edgebridge-aeb -- BRIDGE networking variant (isolated, explicit port mapping).
#
# Use this only if you can't / don't want host networking (e.g. you need port
# isolation). The default docker-compose.yml uses host networking instead.
#
# ⚠️ With bridge networking, incoming client IPs appear as the Docker gateway
# (172.17.0.1), so mDNS auto-discovery and device->hub / MQTT forward auto-IP do
# NOT work. Pass explicit addresses, or use the default host-network compose.
#
# Port mapping: left = host port (free to choose), right = container port (the app
# always listens on 8088 inside the container).

services:
  edgebridge:
    image: woobooung/edgebridge-aeb:latest
    container_name: edgebridge-aeb
    ports:
      - "8088:8088"
    # environment:
    #   - EB_ST_TOKEN=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx   # optional SmartThings PAT
    volumes:
      - ./data:/data
      # - ./edgebridge.cfg:/usr/src/app/edgebridge.cfg       # optional config file
    restart: unless-stopped
