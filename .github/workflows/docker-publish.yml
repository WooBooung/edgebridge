name: Build and publish multi-arch Docker image

# Pushes to main (and version tags) trigger a multi-arch build that is published to Docker Hub.
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:   # allow manual runs from the Actions tab

env:
  IMAGE_NAME: edgebridge-aeb

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build metadata
        id: bmeta
        run: echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_DATE=${{ steps.bmeta.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # NOTE: Docker Hub "Overview" / short description are set manually in the web UI.
      # Docker Hub's description API rejects PATs (needs password-based login), so an
      # automated sync step is intentionally omitted here.
