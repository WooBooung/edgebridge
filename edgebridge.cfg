[config]
# Leave Server_IP blank to auto-detect, or pin it to a specific interface IP.
Server_IP =
Server_Port = 8088
# Optional 36-char SmartThings Personal Access Token (auto-injected for api.smartthings.com).
# Paste the token WITHOUT quotes  ->  SmartThings_Bearer_Token = xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
SmartThings_Bearer_Token =
forwarding_timeout = 5
console_output = yes
logfile_output = no
logfile = edgebridge.log
# Where to persist .registrations / redirects.jsonl / callbacks.jsonl / mqtt_certs / install_id.
# Overridden by the EB_DATA_DIR environment variable (Docker sets EB_DATA_DIR=/data).
Data_Dir =
# mDNS auto-discovery (service "_edgebridge._tcp", so Edge drivers find the bridge).
# Only works on host/macvlan networking -- NOT Docker bridge. Set to "no" to disable.
mDNS_enabled = yes
mDNS_name = EdgeBridge-aeb
